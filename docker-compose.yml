services:
  postgres:
    image: postgres:15-alpine
    container_name: versecraft-postgres
    restart: unless-stopped
    profiles: ["local"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-versecraft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_local_only}
      POSTGRES_DB: ${POSTGRES_DB:-versecraft}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: versecraft-redis
    restart: unless-stopped
    profiles: ["local"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:

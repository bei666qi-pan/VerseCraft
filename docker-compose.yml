services:
  postgres:
    image: postgres:15-alpine
    container_name: versecraft-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: versecraft
      POSTGRES_PASSWORD: versecraft_password
      POSTGRES_DB: versecraft
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: versecraft-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:

name: CI

on:
  push:
    branches: [main, preview]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 20 * * *"
  workflow_dispatch:
    inputs:
      live_chat_perf:
        description: "Run live /api/chat latency benchmark with AI gateway secrets"
        required: false
        type: boolean
        default: false

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.22.2"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint, unit tests, production build
        run: pnpm test:ci
        env:
          AUTH_SECRET: ci-placeholder-auth-secret-at-least-32-chars-long
          DATABASE_URL: postgres://ci:ci@127.0.0.1:5432/ci
          REDIS_URL: ""

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps

      - name: Admin API and dashboard degraded smoke
        run: pnpm test:admin:api && pnpm test:admin:perf
        env:
          CI: "true"
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          PLAYWRIGHT_WEB_SERVER_COMMAND: pnpm exec next dev --webpack -p 3000
          AUTH_SECRET: ci-placeholder-auth-secret-at-least-32-chars-long
          DATABASE_URL: postgres://ci:ci@127.0.0.1:5432/ci
          REDIS_URL: ""
          ADMIN_PASSWORD: ci-admin-password-placeholder
          ADMIN_CRON_SECRET: ci-admin-cron-secret-placeholder
          AI_GATEWAY_BASE_URL: ""
          AI_GATEWAY_API_KEY: ""
          AI_MODEL_MAIN: ""
          AI_MODEL_CONTROL: ""
          AI_MODEL_ENHANCE: ""
          AI_MODEL_REASONER: ""
          VC_DISABLE_AI_ENV_FILE_RELOAD: "1"
          VC_FORCE_AI_KEYS_MISSING: "1"

  e2e-contract:
    name: E2E contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.22.2"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps

      - name: E2E contract (no AI gateway; degraded SSE)
        run: pnpm run test:e2e:contract
        env:
          CI: "true"
          E2E_EXPECT_KEYS_MISSING: "1"
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          PLAYWRIGHT_WEB_SERVER_COMMAND: pnpm exec next dev --webpack -p 3000
          AUTH_SECRET: ci-placeholder-auth-secret-at-least-32-chars-long
          DATABASE_URL: postgres://ci:ci@127.0.0.1:5432/ci
          REDIS_URL: ""
          AI_GATEWAY_BASE_URL: ""
          AI_GATEWAY_API_KEY: ""
          AI_MODEL_MAIN: ""
          AI_MODEL_CONTROL: ""
          AI_MODEL_ENHANCE: ""
          AI_MODEL_REASONER: ""
          VC_DISABLE_AI_ENV_FILE_RELOAD: "1"
          VC_FORCE_AI_KEYS_MISSING: "1"

  mock-chat-guardrails:
    name: mock-chat-guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.22.2"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps

      - name: Build production app for mock guardrails
        run: pnpm build
        env:
          CI: "true"
          AUTH_SECRET: ci-placeholder-auth-secret-at-least-32-chars-long
          DATABASE_URL: postgres://ci:ci@127.0.0.1:5432/ci
          REDIS_URL: ""
          AI_PROVIDER: mock
          AI_GATEWAY_BASE_URL: ""
          AI_GATEWAY_API_KEY: ""
          AI_MODEL_MAIN: ""
          AI_MODEL_CONTROL: ""
          AI_MODEL_ENHANCE: ""
          AI_MODEL_REASONER: ""
          VC_DISABLE_AI_ENV_FILE_RELOAD: "1"

      - name: Mock E2E, benchmark, and eval
        run: |
          mkdir -p .runtime-data
          pnpm run test:e2e:mock
          pnpm exec next start -p 3000 > .runtime-data/mock-next.log 2>&1 &
          mock_server_pid=$!
          trap 'kill "$mock_server_pid" 2>/dev/null || true' EXIT
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:3000 >/dev/null
          BENCHMARK_BASE_URL=http://127.0.0.1:3000 pnpm run benchmark:chat:mock
          BENCHMARK_BASE_URL=http://127.0.0.1:3000 pnpm run eval:chat-quality:mock
          BENCHMARK_BASE_URL=http://127.0.0.1:3000 pnpm run eval:narrative-safety:mock
          kill "$mock_server_pid" 2>/dev/null || true
          wait "$mock_server_pid" 2>/dev/null || true
          trap - EXIT
        env:
          CI: "true"
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          PLAYWRIGHT_WEB_SERVER_COMMAND: pnpm exec next start -p 3000
          AUTH_SECRET: ci-placeholder-auth-secret-at-least-32-chars-long
          DATABASE_URL: postgres://ci:ci@127.0.0.1:5432/ci
          REDIS_URL: ""
          AI_PROVIDER: mock
          AI_GATEWAY_BASE_URL: ""
          AI_GATEWAY_API_KEY: ""
          AI_MODEL_MAIN: ""
          AI_MODEL_CONTROL: ""
          AI_MODEL_ENHANCE: ""
          AI_MODEL_REASONER: ""
          VC_DISABLE_AI_ENV_FILE_RELOAD: "1"

      - name: Upload mock benchmark and eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mock-chat-guardrails
          path: |
            .runtime-data/chat-benchmark-mock.json
            .runtime-data/eval-chat-quality-mock.json
            .runtime-data/eval-narrative-safety-mock.json
            .runtime-data/mock-next.log

  narrative-safety-mock-gate:
    name: narrative-safety mock gate
    runs-on: ubuntu-latest
    needs: mock-chat-guardrails
    if: always()
    steps:
      - name: Download mock guardrail artifacts
        uses: actions/download-artifact@v4
        with:
          name: mock-chat-guardrails
          path: .runtime-data

      - name: Assert narrative safety mock report
        run: |
          mkdir -p .runtime-data
          node <<'NODE' | tee .runtime-data/narrative-safety-mock-gate.log
          const fs = require("node:fs");
          const path = require("node:path");
          const candidates = [
            ".runtime-data/eval-narrative-safety-mock.json",
            ".runtime-data/.runtime-data/eval-narrative-safety-mock.json",
          ];
          const reportPath = candidates.find((candidate) => fs.existsSync(candidate));
          if (!reportPath) {
            console.error("Missing eval-narrative-safety-mock.json artifact.");
            process.exit(1);
          }
          const report = JSON.parse(fs.readFileSync(reportPath, "utf8"));
          const summary = report.summary ?? {};
          const requiredRates = [
            "jsonPassRate",
            "ssePassRate",
            "unknownEntityPassRate",
            "unregisteredNpcPassRate",
            "speakerPresencePassRate",
            "npcKnowledgePassRate",
            "unsupportedFactPassRate",
            "pacingPassRate",
            "promptInjectionPassRate",
            "commitSafetyPassRate",
          ];
          const failures = [];
          for (const key of requiredRates) {
            if (summary[key] !== 1) failures.push(`${key}=${summary[key]}`);
          }
          if (summary.severeErrorCount !== 0) failures.push(`severeErrorCount=${summary.severeErrorCount}`);
          if (summary.gatePass !== true) failures.push(`gatePass=${summary.gatePass}`);
          console.log(`Narrative safety mock report: ${path.normalize(reportPath)}`);
          console.log(JSON.stringify(summary, null, 2));
          if (failures.length > 0) {
            console.error(`Narrative safety mock gate failed: ${failures.join(", ")}`);
            process.exit(1);
          }
          console.log("Narrative safety mock gate passed.");
          NODE

      - name: Upload narrative safety gate artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: narrative-safety-mock-gate
          path: |
            .runtime-data/eval-narrative-safety-mock.json
            .runtime-data/.runtime-data/eval-narrative-safety-mock.json
            .runtime-data/narrative-safety-mock-gate.log
            .runtime-data/mock-next.log
            .runtime-data/.runtime-data/mock-next.log

  live-chat-perf:
    name: live-chat-perf
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Check live perf configuration
        id: live_perf
        env:
          AI_GATEWAY_BASE_URL: ${{ secrets.AI_GATEWAY_BASE_URL }}
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
          AI_MODEL_MAIN: ${{ secrets.AI_MODEL_MAIN }}
          LIVE_CHAT_PERF_INPUT: ${{ github.event.inputs.live_chat_perf }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "$LIVE_CHAT_PERF_INPUT" != "true" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Live chat perf not requested for manual run."
            exit 0
          fi
          if [ -z "$AI_GATEWAY_BASE_URL" ] || [ -z "$AI_GATEWAY_API_KEY" ] || [ -z "$AI_MODEL_MAIN" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "AI gateway secrets are not configured; skipping live chat perf."
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.live_perf.outputs.enabled == 'true'

      - uses: pnpm/action-setup@v4
        if: steps.live_perf.outputs.enabled == 'true'

      - uses: actions/setup-node@v4
        if: steps.live_perf.outputs.enabled == 'true'
        with:
          node-version: "22.22.2"
          cache: "pnpm"

      - name: Install
        if: steps.live_perf.outputs.enabled == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build production app
        if: steps.live_perf.outputs.enabled == 'true'
        run: pnpm build
        env:
          AUTH_SECRET: ci-placeholder-auth-secret-at-least-32-chars-long
          DATABASE_URL: postgres://ci:ci@127.0.0.1:5432/ci
          REDIS_URL: ""
          AI_GATEWAY_BASE_URL: ${{ secrets.AI_GATEWAY_BASE_URL }}
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
          AI_MODEL_MAIN: ${{ secrets.AI_MODEL_MAIN }}
          AI_MODEL_CONTROL: ${{ secrets.AI_MODEL_CONTROL }}
          AI_MODEL_ENHANCE: ${{ secrets.AI_MODEL_ENHANCE }}
          AI_MODEL_REASONER: ${{ secrets.AI_MODEL_REASONER }}

      - name: Live /api/chat latency benchmark
        if: steps.live_perf.outputs.enabled == 'true'
        run: |
          mkdir -p .runtime-data
          pnpm exec next start -p 3000 > .runtime-data/live-chat-next.log 2>&1 &
          live_server_pid=$!
          trap 'kill "$live_server_pid" 2>/dev/null || true' EXIT
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:3000 >/dev/null
          E2E_AI_LIVE=1 VC_ASSERT_CHAT_LATENCY_BUDGET=1 BENCHMARK_BASE_URL=http://127.0.0.1:3000 pnpm benchmark:chat-metrics -- --mode live --assert-budget --include-all --json-out .runtime-data/live-chat-benchmark.json
          if [ "${{ github.event_name }}" = "schedule" ]; then
            E2E_AI_LIVE=1 BENCHMARK_BASE_URL=http://127.0.0.1:3000 pnpm eval:chat-quality -- --mode live --assert --json-out .runtime-data/live-chat-quality-eval.json
            E2E_AI_LIVE=1 BENCHMARK_BASE_URL=http://127.0.0.1:3000 pnpm eval:narrative-safety -- --mode live --assert --json-out .runtime-data/live-narrative-safety-eval.json
          fi
          kill "$live_server_pid" 2>/dev/null || true
          wait "$live_server_pid" 2>/dev/null || true
          trap - EXIT
        env:
          AUTH_SECRET: ci-placeholder-auth-secret-at-least-32-chars-long
          DATABASE_URL: postgres://ci:ci@127.0.0.1:5432/ci
          REDIS_URL: ""
          AI_GATEWAY_BASE_URL: ${{ secrets.AI_GATEWAY_BASE_URL }}
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
          AI_MODEL_MAIN: ${{ secrets.AI_MODEL_MAIN }}
          AI_MODEL_CONTROL: ${{ secrets.AI_MODEL_CONTROL }}
          AI_MODEL_ENHANCE: ${{ secrets.AI_MODEL_ENHANCE }}
          AI_MODEL_REASONER: ${{ secrets.AI_MODEL_REASONER }}
          AI_PLAYER_CHAT_MERGE_EXTRA_BODY: ${{ secrets.AI_PLAYER_CHAT_MERGE_EXTRA_BODY }}
          AI_PLAYER_CHAT_EXTRA_BODY_JSON: ${{ secrets.AI_PLAYER_CHAT_EXTRA_BODY_JSON }}

      - name: Upload live benchmark artifact
        if: steps.live_perf.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: live-chat-benchmark
          path: |
            .runtime-data/live-chat-benchmark.json
            .runtime-data/live-chat-quality-eval.json
            .runtime-data/live-narrative-safety-eval.json
            .runtime-data/live-chat-next.log

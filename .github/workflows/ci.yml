name: CI

on:
  push:
    branches: [main, preview]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      live_chat_perf:
        description: "Run live /api/chat latency benchmark with AI gateway secrets"
        required: false
        type: boolean
        default: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Omit `version`: must match package.json `packageManager` exactly; `version: 10` conflicts with `pnpm@10.0.0`.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.22.2"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint, unit tests, production build
        run: pnpm test:ci
        env:
          # next build may read optional AI keys; CI image has none — placeholders satisfy any stray reads.
          AUTH_SECRET: ci-placeholder-auth-secret-at-least-32-chars-long
          DATABASE_URL: postgres://ci:ci@127.0.0.1:5432/ci
          # Redis is optional in CI. Keep it empty so rate limits and caches use in-memory fallback.
          REDIS_URL: ""

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps

      - name: E2E contract (no AI gateway — degraded SSE)
        run: pnpm run test:e2e:contract
        env:
          CI: "true"
          E2E_EXPECT_KEYS_MISSING: "1"
          # 避免与开发者本机已占用的 666 冲突；CI 内单独起 3000
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          PLAYWRIGHT_WEB_SERVER_COMMAND: pnpm exec next dev --webpack -p 3000
          AUTH_SECRET: ci-placeholder-auth-secret-at-least-32-chars-long
          DATABASE_URL: postgres://ci:ci@127.0.0.1:5432/ci
          # Redis is optional in CI. Keep it empty so degraded SSE never tries 127.0.0.1:6379.
          REDIS_URL: ""
          # Ensure PR / fork runs do not pick up accidental AI_* from the shell
          AI_GATEWAY_BASE_URL: ""
          AI_GATEWAY_API_KEY: ""
          AI_MODEL_MAIN: ""
          AI_MODEL_CONTROL: ""
          AI_MODEL_ENHANCE: ""
          AI_MODEL_REASONER: ""
          VC_DISABLE_AI_ENV_FILE_RELOAD: "1"
          VC_FORCE_AI_KEYS_MISSING: "1"

      - name: Admin API and dashboard degraded smoke
        run: pnpm test:admin:api && pnpm test:admin:perf
        env:
          CI: "true"
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          PLAYWRIGHT_WEB_SERVER_COMMAND: pnpm exec next dev --webpack -p 3000
          AUTH_SECRET: ci-placeholder-auth-secret-at-least-32-chars-long
          DATABASE_URL: postgres://ci:ci@127.0.0.1:5432/ci
          REDIS_URL: ""
          ADMIN_PASSWORD: ci-admin-password-placeholder
          ADMIN_CRON_SECRET: ci-admin-cron-secret-placeholder
          AI_GATEWAY_BASE_URL: ""
          AI_GATEWAY_API_KEY: ""
          AI_MODEL_MAIN: ""
          AI_MODEL_CONTROL: ""
          AI_MODEL_ENHANCE: ""
          AI_MODEL_REASONER: ""
          VC_DISABLE_AI_ENV_FILE_RELOAD: "1"
          VC_FORCE_AI_KEYS_MISSING: "1"

  live-chat-perf:
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name != 'pull_request'
    steps:
      - name: Check live perf configuration
        id: live_perf
        env:
          AI_GATEWAY_BASE_URL: ${{ secrets.AI_GATEWAY_BASE_URL }}
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
          AI_MODEL_MAIN: ${{ secrets.AI_MODEL_MAIN }}
          LIVE_CHAT_PERF_INPUT: ${{ github.event.inputs.live_chat_perf }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "$LIVE_CHAT_PERF_INPUT" != "true" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Live chat perf not requested for manual run."
            exit 0
          fi
          if [ -z "$AI_GATEWAY_BASE_URL" ] || [ -z "$AI_GATEWAY_API_KEY" ] || [ -z "$AI_MODEL_MAIN" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "AI gateway secrets are not configured; skipping live chat perf."
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.live_perf.outputs.enabled == 'true'

      - uses: pnpm/action-setup@v4
        if: steps.live_perf.outputs.enabled == 'true'

      - uses: actions/setup-node@v4
        if: steps.live_perf.outputs.enabled == 'true'
        with:
          node-version: "22.22.2"
          cache: "pnpm"

      - name: Install
        if: steps.live_perf.outputs.enabled == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build production app
        if: steps.live_perf.outputs.enabled == 'true'
        run: pnpm build
        env:
          AUTH_SECRET: ci-placeholder-auth-secret-at-least-32-chars-long
          DATABASE_URL: postgres://ci:ci@127.0.0.1:5432/ci
          REDIS_URL: ""
          AI_GATEWAY_BASE_URL: ${{ secrets.AI_GATEWAY_BASE_URL }}
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
          AI_MODEL_MAIN: ${{ secrets.AI_MODEL_MAIN }}
          AI_MODEL_CONTROL: ${{ secrets.AI_MODEL_CONTROL }}
          AI_MODEL_ENHANCE: ${{ secrets.AI_MODEL_ENHANCE }}
          AI_MODEL_REASONER: ${{ secrets.AI_MODEL_REASONER }}

      - name: Live /api/chat latency benchmark
        if: steps.live_perf.outputs.enabled == 'true'
        run: |
          mkdir -p .runtime-data
          pnpm exec next start -p 3000 > .runtime-data/live-chat-next.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:3000 >/dev/null
          E2E_AI_LIVE=1 VC_ASSERT_CHAT_LATENCY_BUDGET=1 BENCHMARK_BASE_URL=http://127.0.0.1:3000 pnpm benchmark:chat-metrics -- --assert-budget --json-out .runtime-data/live-chat-benchmark.json
        env:
          AUTH_SECRET: ci-placeholder-auth-secret-at-least-32-chars-long
          DATABASE_URL: postgres://ci:ci@127.0.0.1:5432/ci
          REDIS_URL: ""
          AI_GATEWAY_BASE_URL: ${{ secrets.AI_GATEWAY_BASE_URL }}
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
          AI_MODEL_MAIN: ${{ secrets.AI_MODEL_MAIN }}
          AI_MODEL_CONTROL: ${{ secrets.AI_MODEL_CONTROL }}
          AI_MODEL_ENHANCE: ${{ secrets.AI_MODEL_ENHANCE }}
          AI_MODEL_REASONER: ${{ secrets.AI_MODEL_REASONER }}
          AI_PLAYER_CHAT_MERGE_EXTRA_BODY: ${{ secrets.AI_PLAYER_CHAT_MERGE_EXTRA_BODY }}
          AI_PLAYER_CHAT_EXTRA_BODY_JSON: ${{ secrets.AI_PLAYER_CHAT_EXTRA_BODY_JSON }}

      - name: Upload live benchmark artifact
        if: steps.live_perf.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: live-chat-benchmark
          path: |
            .runtime-data/live-chat-benchmark.json
            .runtime-data/live-chat-next.log

name: Sync Gitee Branches

on:
  push:
    branches: [main, preview]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-gitee:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add Gitee remote
        env:
          GITEE_REPO_URL: ${{ secrets.GITEE_REPO_URL }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${GITEE_REPO_URL}" ] || [ -z "${GITEE_TOKEN}" ]; then
            echo "Missing GITEE_REPO_URL or GITEE_TOKEN."
            exit 1
          fi

          case "${GITEE_REPO_URL}" in
            https://*) repo_without_scheme="${GITEE_REPO_URL#https://}" ;;
            *) echo "Gitee repository URL must start with https://"; exit 1 ;;
          esac

          git remote add gitee "https://oauth2:${GITEE_TOKEN}@${repo_without_scheme}"

      - name: Push current branch to Gitee
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ "${BRANCH_NAME}" != "main" ] && [ "${BRANCH_NAME}" != "preview" ]; then
            echo "Skipping unsupported branch ${BRANCH_NAME}."
            exit 0
          fi

          git fetch --no-tags gitee "+refs/heads/${BRANCH_NAME}:refs/remotes/gitee/${BRANCH_NAME}" || true
          expected="$(git rev-parse --verify "refs/remotes/gitee/${BRANCH_NAME}" 2>/dev/null || true)"

          if [ -n "${expected}" ]; then
            # GitHub is the source of truth; Gitee is a deployment mirror.
            git push gitee "HEAD:refs/heads/${BRANCH_NAME}" "--force-with-lease=refs/heads/${BRANCH_NAME}:${expected}"
          else
            git push gitee "HEAD:refs/heads/${BRANCH_NAME}"
          fi

          echo "Gitee ${BRANCH_NAME} branch sync completed."

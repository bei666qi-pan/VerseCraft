name: Sync Gitee Branches

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, preview]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to sync and deploy"
        required: true
        default: "main"
        type: choice
        options:
          - main
          - preview

permissions:
  contents: read

concurrency:
  group: gitee-sync-${{ github.event.workflow_run.head_branch || inputs.branch }}
  cancel-in-progress: true

jobs:
  sync-gitee:
    if: >-
      ${{
        (
          github.event_name == 'workflow_dispatch' &&
          (inputs.branch == 'main' || inputs.branch == 'preview')
        ) || (
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' &&
          (
            github.event.workflow_run.head_branch == 'main' ||
            github.event.workflow_run.head_branch == 'preview'
          )
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      TARGET_BRANCH: ${{ github.event.workflow_run.head_branch || inputs.branch }}
      TARGET_REF: ${{ github.event.workflow_run.head_sha || inputs.branch }}
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_REF }}
          fetch-depth: 0

      - name: Show deployment target
        run: |
          set -euo pipefail
          echo "Deployment event: ${GITHUB_EVENT_NAME}"
          echo "Target branch: ${TARGET_BRANCH}"
          echo "Target ref: ${TARGET_REF}"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add Gitee remote
        env:
          GITEE_REPO_URL: ${{ secrets.GITEE_REPO_URL }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${GITEE_REPO_URL}" ] || [ -z "${GITEE_TOKEN}" ]; then
            echo "Missing GITEE_REPO_URL or GITEE_TOKEN."
            exit 1
          fi

          case "${GITEE_REPO_URL}" in
            https://*) repo_without_scheme="${GITEE_REPO_URL#https://}" ;;
            *) echo "Gitee repository URL must start with https://"; exit 1 ;;
          esac

          git remote add gitee "https://oauth2:${GITEE_TOKEN}@${repo_without_scheme}"

      - name: Push current branch to Gitee
        timeout-minutes: 22
        env:
          BRANCH_NAME: ${{ env.TARGET_BRANCH }}
          GIT_TERMINAL_PROMPT: "0"
          GIT_ASKPASS: /bin/false
        run: |
          set -euo pipefail

          if [ "${BRANCH_NAME}" != "main" ] && [ "${BRANCH_NAME}" != "preview" ]; then
            echo "Skipping unsupported branch ${BRANCH_NAME}."
            exit 0
          fi

          git config --global http.lowSpeedLimit 1024
          git config --global http.lowSpeedTime 60
          # The BGM asset commit can produce a 100 MiB+ pack. Buffer it so Gitee receives
          # a Content-Length POST instead of chunked transfer through HTTPS proxies.
          git config --global http.postBuffer 524288000

          echo "Checking Gitee remote access for ${BRANCH_NAME}."
          set +e
          timeout 60s git ls-remote --heads gitee "${BRANCH_NAME}" >/tmp/gitee-heads.txt
          ls_remote_status=$?
          set -e
          if [ "${ls_remote_status}" -ne 0 ]; then
            echo "::error::Cannot reach or authenticate to the Gitee remote within 60 seconds. Check GITEE_REPO_URL, GITEE_TOKEN, Gitee availability, and whether HTTPS token auth is still accepted."
            exit "${ls_remote_status}"
          fi

          expected="$(awk 'NR == 1 { print $1 }' /tmp/gitee-heads.txt)"
          push_ref="HEAD:refs/heads/${BRANCH_NAME}"
          push_lease=()

          if [ -n "${expected}" ]; then
            # GitHub is the source of truth; Gitee is a deployment mirror.
            push_lease=("--force-with-lease=refs/heads/${BRANCH_NAME}:${expected}")
          fi

          echo "Pushing ${BRANCH_NAME} to Gitee with a 20 minute hard timeout."
          set +e
          timeout 1200s git push --verbose gitee "${push_ref}" "${push_lease[@]}"
          push_status=$?
          set -e
          if [ "${push_status}" -ne 0 ]; then
            echo "::error::Gitee push failed or timed out after 20 minutes. Common causes: invalid/expired Gitee token, Gitee HTTPS auth changes, GitHub-to-Gitee network stalls, or remote rejection while transferring a large pack."
            git count-objects -vH || true
            exit "${push_status}"
          fi

          echo "Gitee ${BRANCH_NAME} branch sync completed."

      - name: Trigger Coolify deploy
        id: deploy
        env:
          BRANCH_NAME: ${{ env.TARGET_BRANCH }}
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_API_KEY: ${{ secrets.COOLIFY_API_KEY }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}
          COOLIFY_PREVIEW_APP_UUID: ${{ secrets.COOLIFY_PREVIEW_APP_UUID }}
          COOLIFY_DEPLOY_URL: ${{ secrets.COOLIFY_DEPLOY_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_PREVIEW_DEPLOY_URL: ${{ secrets.COOLIFY_PREVIEW_DEPLOY_URL }}
          COOLIFY_PREVIEW_TOKEN: ${{ secrets.COOLIFY_PREVIEW_TOKEN }}
        run: |
          set -euo pipefail

          deploy_url=""
          deploy_token=""
          deploy_url_secret=""
          deploy_token_secret=""
          app_uuid=""
          use_api="false"
          health_url=""

          echo "deployed=false" >> "${GITHUB_OUTPUT}"
          echo "health_url=" >> "${GITHUB_OUTPUT}"
          echo "deployment_uuid=" >> "${GITHUB_OUTPUT}"

          case "${BRANCH_NAME}" in
            main)
              app_uuid="${COOLIFY_APP_UUID}"
              health_url="https://versecraft.cn/api/health"
              if [ -n "${COOLIFY_BASE_URL}" ] && [ -n "${COOLIFY_API_KEY}" ] && [ -n "${app_uuid}" ]; then
                use_api="true"
              else
                echo "::error::Main deploy requires COOLIFY_BASE_URL, COOLIFY_API_KEY, and COOLIFY_APP_UUID so Actions can queue a non-forced Coolify API deployment and poll the deployment UUID."
                exit 1
              fi
              ;;
            preview)
              app_uuid="${COOLIFY_PREVIEW_APP_UUID}"
              health_url="https://preview.versecraft.cn/api/health"
              if [ -n "${COOLIFY_BASE_URL}" ] && [ -n "${COOLIFY_API_KEY}" ] && [ -n "${app_uuid}" ]; then
                use_api="true"
              else
                deploy_url="${COOLIFY_PREVIEW_DEPLOY_URL}"
                deploy_token="${COOLIFY_PREVIEW_TOKEN}"
                deploy_url_secret="COOLIFY_PREVIEW_DEPLOY_URL"
                deploy_token_secret="COOLIFY_PREVIEW_TOKEN"
              fi
              if [ "${use_api}" != "true" ] && [ -z "${deploy_url}" ] && [ -z "${deploy_token}" ]; then
                echo "No preview Coolify deploy secrets configured; skipping preview deploy after Gitee sync."
                exit 0
              fi
              ;;
            *)
              echo "Skipping Coolify deploy for unsupported branch ${BRANCH_NAME}."
              exit 0
              ;;
          esac

          if [ "${use_api}" = "true" ]; then
            echo "Triggering Coolify API deploy for ${BRANCH_NAME} after Gitee sync."
            export COOLIFY_SELECTED_APP_UUID="${app_uuid}"
            python - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request
          from pathlib import Path

          base = os.environ["COOLIFY_BASE_URL"].rstrip("/")
          if not base.endswith("/api/v1"):
              base = f"{base}/api/v1"
          app_uuid = os.environ["COOLIFY_SELECTED_APP_UUID"]
          api_key = os.environ["COOLIFY_API_KEY"]
          query = urllib.parse.urlencode({
              "uuid": app_uuid,
              "force": "false",
              "instant_deploy": "true",
          })
          url = f"{base}/deploy?{query}"
          headers = {
              "Accept": "application/json",
              "Authorization": f"Bearer {api_key}",
              "User-Agent": "VerseCraft-GitHub-Actions",
          }

          last_error = ""
          response_text = ""
          for method in ("GET", "POST"):
              request = urllib.request.Request(url, headers=headers, method=method)
              try:
                  with urllib.request.urlopen(request, timeout=30) as response:
                      response_text = response.read().decode("utf-8", errors="replace")
                      break
              except urllib.error.HTTPError as error:
                  last_error = f"{method} {error.code}: {error.read().decode('utf-8', errors='replace')[:400]}"
              except Exception as error:
                  last_error = f"{method}: {error}"
          else:
              print(f"::error::Coolify API deploy failed: {last_error}")
              raise SystemExit(1)

          try:
              data = json.loads(response_text) if response_text.strip() else {}
          except json.JSONDecodeError:
              print("::error::Coolify API deploy returned a non-JSON response.")
              raise SystemExit(1)

          deployment_ids = []
          if isinstance(data, dict):
              value = data.get("deployment_uuid")
              if value:
                  deployment_ids.append(str(value))
              deployments = data.get("deployments")
              if isinstance(deployments, list):
                  for item in deployments:
                      if isinstance(item, dict) and item.get("deployment_uuid"):
                          deployment_ids.append(str(item["deployment_uuid"]))

          deployment_ids = [value for value in deployment_ids if value]
          if not deployment_ids:
              print("::error::Coolify API deploy did not return a deployment UUID.")
              raise SystemExit(1)

          Path("/tmp/coolify-deployment-uuid.txt").write_text(deployment_ids[0], encoding="utf-8")
          print(f"Coolify API queued deployment {deployment_ids[0]} with force=false.")
          PY
            deployment_uuid="$(cat /tmp/coolify-deployment-uuid.txt)"
            echo "deployment_uuid=${deployment_uuid}" >> "${GITHUB_OUTPUT}"
            echo "deployed=true" >> "${GITHUB_OUTPUT}"
            echo "health_url=${health_url}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ -z "${deploy_url}" ]; then
            echo "::error::Missing ${deploy_url_secret}. Configure it in GitHub Actions secrets so ${BRANCH_NAME} pushes can trigger Coolify after the Gitee mirror is updated."
            exit 1
          fi

          if [ -z "${deploy_token}" ]; then
            echo "::error::Missing ${deploy_token_secret}. Configure it in GitHub Actions secrets so ${BRANCH_NAME} pushes can trigger Coolify after the Gitee mirror is updated."
            exit 1
          fi

          echo "Triggering Coolify deploy for ${BRANCH_NAME} after Gitee sync."
          curl --fail --show-error --silent --location --request GET \
            --header "Authorization: Bearer ${deploy_token}" \
            --header "Accept: application/json" \
            "${deploy_url}" >/tmp/coolify-deploy-response.json
          python - <<'PY'
          import json
          from pathlib import Path

          raw = Path("/tmp/coolify-deploy-response.json").read_text(encoding="utf-8").strip()
          if not raw:
              print("Coolify deploy webhook accepted with an empty response.")
              raise SystemExit(0)

          try:
              data = json.loads(raw)
          except json.JSONDecodeError:
              print("Coolify deploy webhook accepted with a non-JSON response.")
              raise SystemExit(0)

          deployments = data.get("deployments")
          if isinstance(deployments, list) and deployments:
              deployment_ids = [str(item.get("deployment_uuid")) for item in deployments if isinstance(item, dict)]
              deployment_ids = [value for value in deployment_ids if value and value != "None"]
              if deployment_ids:
                  print("Coolify deployment UUID(s): " + ", ".join(deployment_ids))
                  Path("/tmp/coolify-deployment-uuid.txt").write_text(deployment_ids[0], encoding="utf-8")
                  raise SystemExit(0)

          print("Coolify deploy webhook accepted.")
          PY
          echo "Coolify deploy webhook accepted for ${BRANCH_NAME}."
          if [ -s /tmp/coolify-deployment-uuid.txt ]; then
            echo "deployment_uuid=$(cat /tmp/coolify-deployment-uuid.txt)" >> "${GITHUB_OUTPUT}"
          fi
          echo "deployed=true" >> "${GITHUB_OUTPUT}"
          echo "health_url=${health_url}" >> "${GITHUB_OUTPUT}"

      - name: Wait for Coolify deployment result
        if: steps.deploy.outputs.deployment_uuid != ''
        env:
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_API_KEY: ${{ secrets.COOLIFY_API_KEY }}
          DEPLOYMENT_UUID: ${{ steps.deploy.outputs.deployment_uuid }}
        run: |
          set -euo pipefail

          if [ -z "${COOLIFY_BASE_URL}" ] || [ -z "${COOLIFY_API_KEY}" ]; then
            echo "::error::Missing Coolify API secrets; cannot poll deployment ${DEPLOYMENT_UUID}."
            exit 1
          fi

          python - <<'PY'
          import json
          import os
          import re
          import sys
          import time
          import urllib.error
          import urllib.request

          base = os.environ["COOLIFY_BASE_URL"].rstrip("/")
          if not base.endswith("/api/v1"):
              base = f"{base}/api/v1"
          deployment_uuid = os.environ["DEPLOYMENT_UUID"]
          api_key = os.environ["COOLIFY_API_KEY"]
          url = f"{base}/deployments/{deployment_uuid}"
          headers = {
              "Accept": "application/json",
              "Authorization": f"Bearer {api_key}",
              "User-Agent": "VerseCraft-GitHub-Actions",
          }
          success_re = re.compile(r"(success|finished|completed)", re.I)
          failure_re = re.compile(r"(fail|failed|error|cancel|cancelled|exited|unhealthy)", re.I)

          def sanitize_tail(data):
              raw_logs = data.get("logs")
              if isinstance(raw_logs, str):
                  try:
                      raw_logs = json.loads(raw_logs)
                  except json.JSONDecodeError:
                      raw_logs = []
              if not isinstance(raw_logs, list):
                  return []
              visible = []
              for entry in raw_logs:
                  if not isinstance(entry, dict) or entry.get("hidden") is True:
                      continue
                  output = str(entry.get("output", ""))
                  output = re.sub(r"\x1b\[[0-9;]*m", "", output)
                  output = re.sub(r"Bearer\s+[A-Za-z0-9._~+/=-]+", "Bearer <REDACTED>", output)
                  visible.append(output[:500])
              return visible[-12:]

          last_data = {}
          for attempt in range(1, 161):
              request = urllib.request.Request(url, headers=headers, method="GET")
              try:
                  with urllib.request.urlopen(request, timeout=30) as response:
                      text = response.read().decode("utf-8", errors="replace")
                      last_data = json.loads(text) if text.strip() else {}
              except urllib.error.HTTPError as error:
                  print(f"Deployment poll attempt {attempt}/160 returned HTTP {error.code}.")
                  last_data = {}
              except Exception as error:
                  print(f"Deployment poll attempt {attempt}/160 failed: {error}")
                  last_data = {}

              status = str(last_data.get("status") or last_data.get("deployment", {}).get("status") or "")
              print(f"Deployment {deployment_uuid} attempt {attempt}/160 status: {status or 'unknown'}")

              if success_re.search(status):
                  print(f"Coolify deployment {deployment_uuid} completed with status {status}.")
                  raise SystemExit(0)
              if failure_re.search(status):
                  print(f"::error::Coolify deployment {deployment_uuid} failed with status {status}.")
                  for line in sanitize_tail(last_data):
                      print(line)
                  raise SystemExit(1)
              time.sleep(15)

          print(f"::error::Coolify deployment {deployment_uuid} did not finish within 40 minutes.")
          for line in sanitize_tail(last_data):
              print(line)
          raise SystemExit(1)
          PY

      - name: Wait for deployed health endpoint
        if: steps.deploy.outputs.deployed == 'true'
        env:
          HEALTH_URL: ${{ steps.deploy.outputs.health_url }}
        run: |
          set -euo pipefail

          if [ -z "${HEALTH_URL}" ]; then
            echo "::error::Missing health URL for deployed branch."
            exit 1
          fi

          echo "Waiting for healthy response from ${HEALTH_URL}."
          for attempt in $(seq 1 18); do
            status_code="$(curl --output /tmp/versecraft-health-response.txt --silent --show-error --location --write-out "%{http_code}" "${HEALTH_URL}" || true)"

            if [ "${status_code}" = "200" ]; then
              echo "Health check passed on attempt ${attempt}."
              exit 0
            fi

            echo "Health check attempt ${attempt}/18 returned HTTP ${status_code}."
            if [ "${attempt}" -lt 18 ]; then
              sleep 10
            fi
          done

          echo "::error::Health check failed after 18 attempts for ${HEALTH_URL}."
          exit 1

name: Sync Gitee Branches

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, preview]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to sync and deploy"
        required: true
        default: "main"
        type: choice
        options:
          - main
          - preview

permissions:
  contents: read

concurrency:
  group: gitee-sync-${{ github.event.workflow_run.head_branch || inputs.branch }}
  cancel-in-progress: true

jobs:
  sync-gitee:
    if: >-
      ${{
        (
          github.event_name == 'workflow_dispatch' &&
          (inputs.branch == 'main' || inputs.branch == 'preview')
        ) || (
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' &&
          (
            github.event.workflow_run.head_branch == 'main' ||
            github.event.workflow_run.head_branch == 'preview'
          )
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TARGET_BRANCH: ${{ github.event.workflow_run.head_branch || inputs.branch }}
      TARGET_REF: ${{ github.event.workflow_run.head_sha || inputs.branch }}
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_REF }}
          fetch-depth: 0

      - name: Show deployment target
        run: |
          set -euo pipefail
          echo "Deployment event: ${GITHUB_EVENT_NAME}"
          echo "Target branch: ${TARGET_BRANCH}"
          echo "Target ref: ${TARGET_REF}"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add Gitee remote
        env:
          GITEE_REPO_URL: ${{ secrets.GITEE_REPO_URL }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${GITEE_REPO_URL}" ] || [ -z "${GITEE_TOKEN}" ]; then
            echo "Missing GITEE_REPO_URL or GITEE_TOKEN."
            exit 1
          fi

          case "${GITEE_REPO_URL}" in
            https://*) repo_without_scheme="${GITEE_REPO_URL#https://}" ;;
            *) echo "Gitee repository URL must start with https://"; exit 1 ;;
          esac

          git remote add gitee "https://oauth2:${GITEE_TOKEN}@${repo_without_scheme}"

      - name: Push current branch to Gitee
        timeout-minutes: 22
        env:
          BRANCH_NAME: ${{ env.TARGET_BRANCH }}
          GIT_TERMINAL_PROMPT: "0"
          GIT_ASKPASS: /bin/false
        run: |
          set -euo pipefail

          if [ "${BRANCH_NAME}" != "main" ] && [ "${BRANCH_NAME}" != "preview" ]; then
            echo "Skipping unsupported branch ${BRANCH_NAME}."
            exit 0
          fi

          git config --global http.lowSpeedLimit 1024
          git config --global http.lowSpeedTime 60
          # The BGM asset commit can produce a 100 MiB+ pack. Buffer it so Gitee receives
          # a Content-Length POST instead of chunked transfer through HTTPS proxies.
          git config --global http.postBuffer 524288000

          echo "Checking Gitee remote access for ${BRANCH_NAME}."
          set +e
          timeout 60s git ls-remote --heads gitee "${BRANCH_NAME}" >/tmp/gitee-heads.txt
          ls_remote_status=$?
          set -e
          if [ "${ls_remote_status}" -ne 0 ]; then
            echo "::error::Cannot reach or authenticate to the Gitee remote within 60 seconds. Check GITEE_REPO_URL, GITEE_TOKEN, Gitee availability, and whether HTTPS token auth is still accepted."
            exit "${ls_remote_status}"
          fi

          expected="$(awk 'NR == 1 { print $1 }' /tmp/gitee-heads.txt)"
          push_ref="HEAD:refs/heads/${BRANCH_NAME}"
          push_lease=()

          if [ -n "${expected}" ]; then
            # GitHub is the source of truth; Gitee is a deployment mirror.
            push_lease=("--force-with-lease=refs/heads/${BRANCH_NAME}:${expected}")
          fi

          echo "Pushing ${BRANCH_NAME} to Gitee with a 20 minute hard timeout."
          set +e
          timeout 1200s git push --verbose gitee "${push_ref}" "${push_lease[@]}"
          push_status=$?
          set -e
          if [ "${push_status}" -ne 0 ]; then
            echo "::error::Gitee push failed or timed out after 20 minutes. Common causes: invalid/expired Gitee token, Gitee HTTPS auth changes, GitHub-to-Gitee network stalls, or remote rejection while transferring a large pack."
            git count-objects -vH || true
            exit "${push_status}"
          fi

          echo "Gitee ${BRANCH_NAME} branch sync completed."

      - name: Trigger Coolify deploy
        id: deploy
        env:
          BRANCH_NAME: ${{ env.TARGET_BRANCH }}
          COOLIFY_DEPLOY_URL: ${{ secrets.COOLIFY_DEPLOY_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_PREVIEW_DEPLOY_URL: ${{ secrets.COOLIFY_PREVIEW_DEPLOY_URL }}
          COOLIFY_PREVIEW_TOKEN: ${{ secrets.COOLIFY_PREVIEW_TOKEN }}
        run: |
          set -euo pipefail

          deploy_url=""
          deploy_token=""
          deploy_url_secret=""
          deploy_token_secret=""
          health_url=""

          echo "deployed=false" >> "${GITHUB_OUTPUT}"
          echo "health_url=" >> "${GITHUB_OUTPUT}"

          case "${BRANCH_NAME}" in
            main)
              deploy_url="${COOLIFY_DEPLOY_URL}"
              deploy_token="${COOLIFY_TOKEN}"
              deploy_url_secret="COOLIFY_DEPLOY_URL"
              deploy_token_secret="COOLIFY_TOKEN"
              health_url="https://versecraft.cn/api/health"
              ;;
            preview)
              deploy_url="${COOLIFY_PREVIEW_DEPLOY_URL}"
              deploy_token="${COOLIFY_PREVIEW_TOKEN}"
              deploy_url_secret="COOLIFY_PREVIEW_DEPLOY_URL"
              deploy_token_secret="COOLIFY_PREVIEW_TOKEN"
              health_url="https://preview.versecraft.cn/api/health"
              if [ -z "${deploy_url}" ] && [ -z "${deploy_token}" ]; then
                echo "No preview Coolify deploy secrets configured; skipping preview deploy after Gitee sync."
                exit 0
              fi
              ;;
            *)
              echo "Skipping Coolify deploy for unsupported branch ${BRANCH_NAME}."
              exit 0
              ;;
          esac

          if [ -z "${deploy_url}" ]; then
            echo "::error::Missing ${deploy_url_secret}. Configure it in GitHub Actions secrets so ${BRANCH_NAME} pushes can trigger Coolify after the Gitee mirror is updated."
            exit 1
          fi

          if [ -z "${deploy_token}" ]; then
            echo "::error::Missing ${deploy_token_secret}. Configure it in GitHub Actions secrets so ${BRANCH_NAME} pushes can trigger Coolify after the Gitee mirror is updated."
            exit 1
          fi

          echo "Triggering Coolify deploy for ${BRANCH_NAME} after Gitee sync."
          curl --fail --show-error --silent --location --request GET \
            --header "Authorization: Bearer ${deploy_token}" \
            --header "Accept: application/json" \
            "${deploy_url}" >/tmp/coolify-deploy-response.json
          python - <<'PY'
          import json
          from pathlib import Path

          raw = Path("/tmp/coolify-deploy-response.json").read_text(encoding="utf-8").strip()
          if not raw:
              print("Coolify deploy webhook accepted with an empty response.")
              raise SystemExit(0)

          try:
              data = json.loads(raw)
          except json.JSONDecodeError:
              print("Coolify deploy webhook accepted with a non-JSON response.")
              raise SystemExit(0)

          deployments = data.get("deployments")
          if isinstance(deployments, list) and deployments:
              deployment_ids = [str(item.get("deployment_uuid")) for item in deployments if isinstance(item, dict)]
              deployment_ids = [value for value in deployment_ids if value and value != "None"]
              if deployment_ids:
                  print("Coolify deployment UUID(s): " + ", ".join(deployment_ids))
                  raise SystemExit(0)

          print("Coolify deploy webhook accepted.")
          PY
          echo "Coolify deploy webhook accepted for ${BRANCH_NAME}."
          echo "deployed=true" >> "${GITHUB_OUTPUT}"
          echo "health_url=${health_url}" >> "${GITHUB_OUTPUT}"

      - name: Wait for deployed health endpoint
        if: steps.deploy.outputs.deployed == 'true'
        env:
          HEALTH_URL: ${{ steps.deploy.outputs.health_url }}
        run: |
          set -euo pipefail

          if [ -z "${HEALTH_URL}" ]; then
            echo "::error::Missing health URL for deployed branch."
            exit 1
          fi

          echo "Waiting for healthy response from ${HEALTH_URL}."
          for attempt in $(seq 1 18); do
            status_code="$(curl --output /tmp/versecraft-health-response.txt --silent --show-error --location --write-out "%{http_code}" "${HEALTH_URL}" || true)"

            if [ "${status_code}" = "200" ]; then
              echo "Health check passed on attempt ${attempt}."
              exit 0
            fi

            echo "Health check attempt ${attempt}/18 returned HTTP ${status_code}."
            if [ "${attempt}" -lt 18 ]; then
              sleep 10
            fi
          done

          echo "::error::Health check failed after 18 attempts for ${HEALTH_URL}."
          exit 1
